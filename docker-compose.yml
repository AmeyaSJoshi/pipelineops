version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=sqlite:///./pipelineops.db
      - ALLOW_WRITES=false
      - GMI_MAAS_BASE_URL=${GMI_MAAS_BASE_URL:-}
      - GMI_MAAS_API_KEY=${GMI_MAAS_API_KEY:-}
      - GMI_SELECTED_MODEL=${GMI_SELECTED_MODEL:-}
      - GMI_MODELS=${GMI_MODELS:-}
      - GOOGLE_SHEETS_CREDENTIALS_JSON=${GOOGLE_SHEETS_CREDENTIALS_JSON:-}
      - GOOGLE_SHEETS_SPREADSHEET_ID=${GOOGLE_SHEETS_SPREADSHEET_ID:-}
    volumes:
      - backend_data:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
